3. Modal Disappearance & Timeouts
Problem: Default timeout is 5s, but the process takes 6s.
Solution:

Action: Do not increase the global timeout, as this slows down the entire suite's failure reporting.

Local Override: Pass a specific timeout to the web-first assertion.
 expect(page.locator('#modal')).toBeHidden({timeout:6000});
Note: This passes immediately once the modal disappears (at 6s), rather than waiting for the full 10s.

