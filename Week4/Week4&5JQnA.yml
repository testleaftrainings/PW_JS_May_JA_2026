6.In an automation framework, why would you make locators or methods private inside a Page Object class?

Locators are usually made private to enforce encapsulation.

Reasons:

Prevent direct access from test files

Ensure locators are used only through page methods

Reduce accidental misuse

Improve maintainability

Example:

class LoginPage {

 private usernameField
 private passwordField

 async login(user, pass){
   await this.usernameField.fill(user)
 }
}

Tests should call:

const login = new LoginPage() // creating an object for the class LoginPage() to call the methods insie the class
loginPage.login()

Not:

page.locator('#username')

