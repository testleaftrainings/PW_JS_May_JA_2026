Q5. Difference between:
type

and

interface in typescript

A common interview question.

### Simple Layman Explanation

Think of **`type`** and **`interface`** as two different ways of creating a **blueprint** for an object.

For example, if you want every employee to have a name and age:

#### Using Interface

```typescript
interface Employee {
  name: string;
  age: number;
}
```

#### Using Type

```typescript
type Employee = {
  name: string;
  age: number;
};
```

For basic object definitions, **both work almost the same**.

---

```typescript
interface Employee {
  name: string;
}

interface Employee {
  age: number;
}
```

TypeScript automatically merges them:

```typescript
const emp: Employee = {
  name: "Ravi",
  age: 25
};
```

This is called **Declaration Merging**.

✅ Possible with Interface

❌ Not possible with Type

---

### Type = Flexible Label

A type is more like a label that can describe many things, not just objects.

It can represent:

#### Object

```typescript
type Employee = {
  name: string;
  age: number;
};
```

#### String Union

```typescript
type PaymentMethod = "UPI" | "CreditCard" | "PayPal";
```

#### Number

```typescript
type Age = number;
```

#### Function

```typescript
type Greet = (name: string) => string;
```

So **type is more flexible**.

---

## Extending

### Interface

```typescript
interface Person {
  name: string;
}

interface Employee extends Person {
  salary: number;
}
```

### Type

```typescript
type Person = {
  name: string;
};

type Employee = Person & {
  salary: number;
};
```

The `&` means combine both.

---

## Interview-Friendly Answer

| Feature                       | Interface | Type               |
| ----------------------------- | --------- | ------------------ |
| Used for Objects              | ✅         | ✅                  |
| Supports Declaration Merging  | ✅         | ❌                  |
| Can represent Union Types     | ❌         | ✅                  |
| Can represent Primitive Types | ❌         | ✅                  |
| Can represent Functions       | ✅         | ✅                  |
| Extending                     | `extends` | `&` (Intersection) |

---

## Easy Way to Remember

👉 **Interface = Best for defining object structures and APIs.**

👉 **Type = Best when you need unions, intersections, primitives, or more complex type combinations.**

### One-line Interview Answer

> "Both `interface` and `type` are used to define custom types in TypeScript. Interfaces are mainly used for object structures and support declaration merging, whereas types are more flexible because they can represent unions, primitives, tuples, and complex type combinations."

