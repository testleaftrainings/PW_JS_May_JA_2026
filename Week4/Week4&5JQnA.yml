7.What is the Page Object Model, and why is it considered a best practice in automation frameworks?

The Page Object Model (POM) is a design pattern where each application page is represented as a class containing:

Page locators

Page actions

Page methods

Example:

LoginPage.ts
DashboardPage.ts
ProfilePage.ts


Why POM is best practice

Improves test readability

Reduces code duplication

Improves maintainability

Centralizes locators

Example:

If a locator changes:

Update in LoginPage only

