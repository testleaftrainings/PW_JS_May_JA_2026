2.Let's say an api request is returning nearly a 1000 record what are the validation you  will be perfomrming in that response

Status Code
Response Time
Schema Validation:

If an API returns around 1000 records, I would first verify the status code to ensure the request was successful. Then I'd check the response time to make sure it meets the application's performance SLA. 
Next, I'd perform schema validation to ensure all records have the expected structure and data types. 
I'd also validate the record count, check important business data such as unique IDs and mandatory fields, and verify any business rules like filtering or sorting. 
If the API uses pagination, I'd validate that all pages return the correct data without duplicates or missing records.

