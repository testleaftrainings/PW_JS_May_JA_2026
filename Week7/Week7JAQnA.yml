8. What are the limitations of API testing using Playwright compared to Postman or REST Assured?**

Playwright’s API testing  is **basic** (good for integration with UI tests).
Postman/REST Assured are more feature-rich for:

  * Extensive assertions
  * Advanced data-driven testing
  * Load/performance testing
  
9.What are some challenges you faced while integrating API and UI tests in Playwright?**

----
1. Keeping test data consistent between API & UI.

 How to Explain in Interview

You can say:

One challenge I faced was maintaining consistency between API-created data and UI validation.
Sometimes data created through API was not immediately reflected in the UI due to caching or backend synchronization delays.
This caused flaky failures where API succeeded but UI validation failed temporarily.

------
2. Managing authentication/session tokens across layers.

 Interview Explanation

One challenge I faced while integrating API and UI testing in Playwright was managing authentication and session tokens across both layers.

In our framework, APIs required bearer tokens for authentication, while the UI maintained its own browser session using cookies or local storage.

The challenge was ensuring that the same authenticated user context was maintained consistently between API calls and browser interactions.

Real-Time Use Case

For example, we used API login to generate an access token and then injected that token into the browser session to bypass UI login.

Sometimes tokens expired during long test executions, or the UI and API used different session handling mechanisms.

This caused failures where:

API requests succeeded
but UI showed user as logged out

or vice versa.

Simple Scenario to Explain
Flow
API Login → Token Generated
↓
Inject token into browser
↓
Open application
Problem

After some time:

API token expired
OR
browser session expired

Then:

API starts returning 401
UI redirects to login page

Result:

flaky failures
Another Strong Real-Time Example

Based on your Salesforce/API experience:

In Salesforce API automation, we generated OAuth tokens dynamically.

One challenge was securely sharing and reusing those tokens across multiple API and UI test flows without hardcoding them.

We handled this using environment variables, reusable fixtures, and centralized token management utilities.

---------
3. Flaky tests if API is unstable.

 One challenge I faced during API and UI integration testing was flaky test failures caused by unstable APIs.

Sometimes backend APIs were slow, temporarily unavailable, or returned intermittent errors like 500 or timeout responses.

Since the UI depended on those APIs, the UI tests also failed even though the automation script itself was correct.

