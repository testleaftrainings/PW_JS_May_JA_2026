10. How do you handle "Race Conditions" where a UI test starts before the API data is ready?

Use page.waitForResponse() or page.waitForRequest(). Instead of using hard-coded sleep or timeout, you wait for the specific API trigger that signals the UI is ready to be interacted with.

Problem

Automation tries:

await page.fill('#search', 'Ravi')

await page.click('text=Ravi')

before search API returns data.

Stable Solution:

await page.fill('#search', 'Ravi')

await page.waitForResponse(response =>  // API response is done to validate if  the API call has completed the fetching of that particular lead/resource
    response.url().includes('/lead/search') &&
    response.status() === 200
)

await page.click('text=Ravi')


Difference Between waitForRequest() and waitForResponse()

Method	Purpose

waitForRequest() waits until the browser sends the API request to the server.
await page.waitForRequest('**/lead/search');

waitForResponse() waits until the server sends back the response and the data is available.
await page.waitForResponse(response =>
    response.url().includes('/lead/search') &&
    response.status() === 200
);

In UI automation, we usually prefer waitForResponse() because it ensures the backend has completed processing and the UI has the data before we interact with the page.


11.What are "Negative Scenarios" you should test?

Sending an empty body to a POST request.
Using invalid data types (e.g., sending a string where an number is expected).
Requesting a resource that doesn't exist (404).
Sending an expired or malformed token (401).