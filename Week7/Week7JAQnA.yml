6. 302 through which we can stop the redirect of the API URL so that we could see the response up to the point before it redirects. Can we stop the redirection through any mechanism?

test('should check redirect status', async ({ request }) => {
  const response = await request.get('/short-url', {
    maxRedirects: 0, // Ensures no redirects are followed
  });
  
  // The response status will be 302 (Found)
  expect(response.status()).toBe(302);
  // You can also check the new location header
  expect(response.headers()['location']).toBe('https://example.com');
});

Setting maxRedirects to 0 achieves the desired control 

