2, Playwright Specific Questions 

**1.Why does Playwright not suffer from the "Stale Element Exception" common in Selenium?**

Answer: This is due to Playwright's auto-waiting and actionability checks. 
Before performing an action, Playwright checks if the element is attached, visible, stable (not animating), and "hit-targetable" (not covered by another element). 
If the element shifts or re-renders, Playwright automatically retries the check until it passes or times out.

**2.A test fails only in CI but passes locally. What is your first step to debug it?**

Answer: Enable Playwright Tracing. Traces capture a "screencast" of the test, network logs, and DOM snapshots at every action, allowing you to visually replay exactly what happened in the CI environment

If a test passes locally but fails in CI, I first suspect environment differences, synchronization issues, missing environment variables, test data dependencies, or parallel execution conflicts. 
I would analyze CI logs, screenshots, videos, and Playwright traces to identify where the failure occurs.
Most CI-only failures are caused by flaky waits, slower execution speeds, configuration differences, or shared test data between parallel runs.

**3.What is the difference between a function login() {} and const login = function() {}? Specifically, how does hoisting affect them in a test script?**

Answer: Function Declarations are hoisted, meaning you can call the function before it is defined in your code. 
Function Expressions are not hoisted; if you try to call them before the line of definition, you will get a ReferenceError.

