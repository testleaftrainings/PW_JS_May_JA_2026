Q9. explain about chromium browser.

Chromium is an open-source browser project by Google, which is the base for Chrome, Edge, Opera, Brave, and others. It uses the Blink engine and V8 JavaScript engine, making it fast and reliable. Playwright uses Chromium for automation because it’s lightweight, open, and widely compatible.”
