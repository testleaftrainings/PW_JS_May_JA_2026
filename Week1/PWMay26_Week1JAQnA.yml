Q10. Can we modify object values declared with const?
const user = {
  name: "John"
};

user.name = "David";
console.log(user.name);

Expected:

David

Why?

user stores the reference/address of the object.
const means:
“this reference cannot point to another object”.

So this is NOT allowed:

const user = { name: "John" };

user = { name: "David" }; // Error

Because you are re-assigning the reference.

But this is allowed:

user.name = "David";

Because you are only changing a property inside the same object.

Simple understanding:

const → reference cannot change
properties inside object → can change

Same applies for arrays:

const arr = [1,2];

arr.push(3); // allowed
console.log(arr); // [1,2,3]

arr = [4,5]; // Error
