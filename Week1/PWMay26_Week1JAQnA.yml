Q12. Difference between == and === ?, Why should automation testers prefer === ?

Expected:

1. Double Equals (==) – Loose Equality

Compares only values, not types.
If types differ, JavaScript does type coercion (tries to convert them before comparing).

Ex:

console.log(5 == "5");   // true  (string "5" → number 5)// converts string 5 into number and then compares).
console.log(0 == false); // true  (false → 0)
console.log(null == undefined); // true  (special case)

2. Triple Equals (===) – Strict Equality

Compares both value and type.
No type coercion happens.

Ex:

console.log(5 === "5");   // false (number vs string)
console.log(0 === false); // false (number vs boolean)
console.log(null === undefined); // false (different types)

