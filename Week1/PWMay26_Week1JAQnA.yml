Q2. What is the output?
console.log(typeof null);

Expected:

object

Follow-up:
Why is it considered a bug?

In the early version of JavaScript, values were stored with type tags internally.
The binary tag used for objects accidentally matched the tag for null.
Because of this design mistake, typeof null started returning "object".

Why not fixed?

Many old websites and applications already depend on this behavior.
Changing it now would break backward compatibility on the web.

