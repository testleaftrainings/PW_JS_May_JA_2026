# 1. Which Git commands do you use?

**Answer:**

> In my day-to-day work, I use the following Git commands:
>
> * `git clone` – To copy a repository from GitHub to my local machine.
> * `git status` – To check the current status of files.
> * `git add .` or `git add <file>` – To stage changes.
> * `git commit -m "message"` – To save changes locally.
> * `git pull` – To get the latest changes from the remote repository.
> * `git push` – To push my changes to the remote repository.
> * `git branch` – To list or create branches.
> * `git checkout` or `git switch` – To switch between branches.
> * `git merge` – To merge one branch into another.
> * `git log` – To view commit history.
> * `git remote -v` – To verify the connected remote repository.

---

# 2. What is Git Stash?

**Answer:**

> Git Stash is used to temporarily save my uncommitted changes without committing them.
>
> For example, if I'm working on a feature and suddenly need to switch to another branch to fix a production issue, 
I use `git stash` to save my current work. After finishing the urgent task, I come back and restore my changes using `git stash pop`.

**Common commands:**

```bash
git stash
git stash list
git stash pop
git stash apply
```

---

# 3. If 30 test cases pass and 1 test case fails in Jenkins, what will you do?

**Answer:**

> First, I will open the Jenkins console logs and identify why that particular test failed.
>
> Then I'll check:
>
> * Whether it's a test script issue.
> * Whether the application has a defect.
> * Whether the locator has changed.
> * Whether it is a timing or synchronization issue.
> * Whether the test failed due to a temporary environment or network problem.
>
> If it's a genuine application defect, I'll report a bug.
> If it's a script issue, I'll fix the automation code and run the test again to confirm the fix.

---

# 4. In Jenkins, if 100 test cases are running and 30 fail due to timing issues, they pass when you increase the timeout. Without using hard-coded waits or increasing the timeout, how would you make those 30 test cases pass?

**Answer:**

> I would improve the synchronization instead of increasing the timeout.
>
> Some approaches are:
>
> * Use Playwright's auto-waiting feature.
> * Wait for the element to become visible or enabled before interacting.
> * Use proper assertions like `expect(locator).toBeVisible()`.
> * Wait for a specific API response if the UI depends on backend data.
> * Wait for a specific page state only when required.
> * Improve locators to make them more stable.
>
> This makes the tests more reliable without using hard-coded waits or unnecessarily increasing the timeout.

