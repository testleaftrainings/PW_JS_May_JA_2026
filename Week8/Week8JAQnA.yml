QUESTION 6: Cross-Browser Testing Configuration
================================================================================

Q: "Your application must work on Chrome, Firefox, and Safari. How would you
   configure Playwright to run the exact same 500 tests across all three
   browsers? How would you handle browser-specific failures without duplicating
   test code? Show configuration examples."

A: I would use Playwright Projects in playwright.config.ts to run the same tests
   across Chromium, Firefox, and WebKit without duplicating test code.

   CONFIGURATION:
   ----------------------------------------------------------------------------
   import { defineConfig } from '@playwright/test';

   export default defineConfig({
     projects: [
       {
         name: 'Chrome',
         use: { browserName: 'chromium' }
       },
       {
         name: 'Firefox',
         use: { browserName: 'firefox' }
       },
       {
         name: 'Safari',
         use: { browserName: 'webkit' }
       }
     ]
   });

   Then simply run:
   npx playwright test

   Playwright automatically executes all tests in all browsers.

   HANDLING BROWSER-SPECIFIC FAILURES:
   ----------------------------------------------------------------------------
   For browser-specific failures, I would avoid duplicating tests. Instead,
   I would handle conditional logic only where needed.

   Option 1 - Skip test for specific browser:
   test.skip(browserName === 'webkit', 'Known Safari issue');

   Option 2 - Conditional logic inside test:
   if (browserName === 'firefox') {
     // Firefox-specific handling
   } else {
     // Standard handling
   }

   Option 3 - Different expectations per browser:
   const expectedColor = browserName === 'safari' ? 'rgb(0,0,255)' : 'blue';

   BEST PRACTICES:
   ----------------------------------------------------------------------------
   • Use stable locators that work across all browsers
   • Avoid browser-specific selectors (webkit- prefixes)
   • Keep assertions generic
   • Track browser-specific bugs separately in issue tracker
   • Run cross-browser tests in CI nightly

   This keeps one reusable test suite while still supporting cross-browser
   compatibility.




7.What challenges have you faced while building or maintaining an automation framework, and how did you resolve them?


Playwright Challenges :
------------------------

1. Normal Click Not Working
Challenge:
locator.click() sometimes fails due to overlays, hidden, or detached elements.
Fix:
Used locator.scrollIntoViewIfNeeded() or force: true.
Added checks like locator.isVisible() before clicking.

2. Timeout and Synchronization Issues
Challenge:
Auto-wait is powerful but can still hit timeouts if network or animation delays occur.
Resolution:
Increased default timeout (page.setDefaultTimeout()).
Implemented retry logic for dynamic components.

Increase the timeout to 60 seconds
page.setDefaultTimeout(60000);

Now Playwright will wait up to 60 seconds for operations like:

locator.click()
locator.fill()
locator.waitFor()
locator.isVisible()
page.waitForSelector()

Instead of the default 30 seconds.

Without setDefaultTimeout()
await page.locator('#login').click();

Suppose the button appears after 40 seconds.

Since the default timeout is 30 seconds, Playwright throws:

TimeoutError: locator.click: Timeout 30000ms exceeded
With setDefaultTimeout(60000)
page.setDefaultTimeout(60000);

await page.locator('#login').click();

Now Playwright waits up to 60 seconds.

If the button appears after 40 seconds:

✔ Click succeeds	

3. Execution Speed & Stability
Challenge:
Playwright executes much faster — can cause sync issues with backend or network.
Fix:
-Add slomo option for debugging.This will slow down execution and help identify timing issues.
-Added necessary waits for API calls or navigation.
Used tracing (context.tracing.start()) to debug flaky tests.


    await page.waitForTimeout(5000)//Dont use unnecessary pause for 5 seconds to see the console output
   
// Wait until the initial HTML document has been parsed.
// Images, CSS, and other resources may still be loading.
await page.waitForLoadState("domcontentloaded");

// Wait until there are no network connections for at least 500 ms.
// Useful for SPAs, but Playwright generally discourages relying on this.
await page.waitForLoadState("networkidle");

// Wait until the page's 'load' event fires.
// This means the document and most dependent resources
// (images, stylesheets, scripts, etc.) have finished loading.
await page.waitForLoadState("load");

    await page.waitForSelector("#username") //wait for that element to be visible before ending the test


4. Dropdown Issue :
Something looks like dropdown but not a dropdown, it took some time for the dropdown to get loaded.
Fix :
Wrote a pressSequentially() method after filling we waited for teh dropdown to get populated we confirmed the value and selected the dropdown.
Element specific implementation.

await locator.pressSequentially('Hello'); // Types instantly
await locator.pressSequentially('World', { delay: 100 }); // Types slower, like a user

