9. Difference between Git Merge and Git Rebase
Answer

Both merge and rebase are used to combine changes from one branch into another, but they do it differently.

Git Merge	Git Rebase
Preserves complete branch history	Rewrites commit history
Creates a new merge commit	No merge commit is created
Easy to understand	Produces a cleaner, linear history
Safe for shared branches	Should not be used on branches already pushed/shared
History looks branched	History looks straight
Example

Suppose we have

main

A ---- B ---- C

feature

      \
       D ---- E
Using Merge
git checkout main
git merge feature

Result

A ---- B ---- C -------- M
      \                /
       D ------------ E

A new Merge Commit (M) is created.

Using Rebase
git checkout feature
git rebase main

Result

A ---- B ---- C ---- D' ---- E'

The commits D and E are replayed on top of main.

When to use Merge?
Team collaboration
Shared branches
Preserve history
Easier to troubleshoot

Example

git checkout main
git merge feature
When to use Rebase?
Before creating a Pull Request
To keep history clean
Personal/local branches

Example

git checkout feature
git rebase main
Interview Answer (1 minute)

Git Merge combines two branches by creating a merge commit, so it preserves the complete branch history. Git Rebase moves the feature branch commits on top of the latest main branch, creating a cleaner linear history without a merge commit. I generally use Merge for shared branches because it is safer, and Rebase for my local feature branches before raising a pull request.

