QUESTION 1: Debugging Random Flaky Tests in CI
================================================================================

Q: "You have a test suite with 200+ tests running nightly on CI. Over the past
   week, 5-10 tests fail randomly each night — different tests, different
   failures. No one has been able to reproduce them locally. How would you
   systematically identify the root cause of these flaky tests? Walk me through
   your debugging process from start to finish?"

A: First, I would not directly start fixing the failed tests individually.
   Since failures are random and not reproducible locally, I would first try to
   identify whether the issue is related to synchronization, environment, test
   data, parallel execution, or infrastructure.

   STEP 1 - Analyze Available Evidence:
   ----------------------------------------------------------------------------
   I would start by analyzing:
   • Playwright trace viewer
   • Video recordings
   • Screenshots
   • CI logs
   • Console logs
   • Network failures

   In Playwright, trace viewer is very useful because it shows each action,
   DOM state, API calls, and timings step-by-step.

   STEP 2 - Look for Patterns:
   ----------------------------------------------------------------------------
   Then I would check whether the failures have any common pattern:
   • Same module? (e.g., all login-related tests)
   • Same environment? (QA vs Staging)
   • Only in headless mode?
   • Only during parallel execution?
   • Only in CI (never locally)?

   STEP 3 - Verify Synchronization Issues:
   ----------------------------------------------------------------------------
   Next, I would verify synchronization issues because most flaky tests happen
   due to improper waits. I would check whether the framework is using:
   • Hard waits (waitForTimeout)
   • Unstable locators
   • Dynamic elements without proper synchronization

   I would replace:
   await page.waitForTimeout(5000);

   with proper waits like:
   await expect(locator).toBeVisible();
   await page.waitForResponse('/api/endpoint');

   STEP 4 - Check Parallel Execution Issues:
   ----------------------------------------------------------------------------
   Sometimes multiple tests use the same user or shared test data, causing
   random failures. To validate this, I would run:
   npx playwright test --workers=1

   If failures disappear, then it is likely a data isolation or concurrency
   issue. I would then implement isolated test data per test.

   STEP 5 - Compare Local vs CI Environment:
   ----------------------------------------------------------------------------
   I would also compare local and CI environments:
   • Browser versions
   • Headless vs headed mode
   • Environment variables
   • Execution speed
   • Memory/CPU usage

   Sometimes CI is slower, which exposes hidden race conditions that don't
   appear locally.

   STEP 6 - Reproduce Flaky Tests Consistently:
   ----------------------------------------------------------------------------
   To reproduce flaky tests consistently, I would run:
   npx playwright test --repeat-each=20 --workers=1

   This helps identify intermittent failures by running the same test multiple
   times.

   STEP 7 - Check API Dependencies:
   ----------------------------------------------------------------------------
   If APIs are unstable, I would inspect failed API responses and response
   timings. For third-party dependencies, I may mock APIs to reduce instability.

   STEP 8 - Implement Long-Term Fixes:
   ----------------------------------------------------------------------------
   Finally, after identifying the root cause, I would improve framework
   stability by:
   • Improving synchronization (web-first assertions)
   • Using stable locators (data-testid, getByRole)
   • Isolating test data (unique per test)
   • Improving fixtures/setup
   • Adding proper cleanup mechanisms
   • Improving logging and reporting

   My focus would be not only fixing the failed test, but improving the overall
   reliability of the automation suite.


