10. How do you integrate Playwright with Docker and execute tests?
Answer

Docker helps run Playwright tests in a consistent environment, regardless of the developer's operating system or the CI server.

Step 1: Install Docker

Install Docker Desktop.

Step 2: Create Dockerfile
FROM mcr.microsoft.com/playwright:v1.55.0-noble

WORKDIR /app

COPY package*.json ./

RUN npm install

COPY . .

CMD ["npx", "playwright", "test"]

The Playwright base image already contains:

Chromium
Firefox
WebKit
Node.js
Required browser dependencies
Step 3: Build Image
docker build -t playwright-tests .
