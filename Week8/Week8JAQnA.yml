QUESTION 4: Secure Secret Management in CI/CD
================================================================================

Q: "Your GitHub Actions pipeline needs to run Playwright tests. You have API
   keys, database passwords, and third-party secrets required for the tests.
   Hardcoding them in the test files is not an option. How would you securely
   store and inject these secrets into your CI/CD pipeline?"

A: I would never hardcode secrets inside test files or commit them to GitHub.

   GITHUB SECRETS (Recommended):
   ----------------------------------------------------------------------------
   In GitHub Actions, I would store all sensitive values in GitHub Secrets:
   • API_TOKEN
   • DB_PASSWORD
   • AUTH_TOKEN
   • CLIENT_SECRET
   • ENCRYPTION_KEY

   Then inject them into the pipeline as environment variables:

   Example GitHub Actions workflow:
   ----------------------------------------------------------------------------
   name: Playwright Tests

   on:
     push:
       branches: [main]

   jobs:
     test:
       runs-on: ubuntu-latest
       env:
         API_TOKEN: ${{ secrets.API_TOKEN }}
         DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
         AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

       steps:
         - uses: actions/checkout@v4
         - uses: actions/setup-node@v4
         - run: npm ci
         - run: npx playwright test

   INSIDE PLAYWRIGHT TESTS:
   ----------------------------------------------------------------------------
   I would access them using:
   const apiToken = process.env.API_TOKEN;
   const dbPassword = process.env.DB_PASSWORD;

   LOCAL DEVELOPMENT:
   ----------------------------------------------------------------------------
   For local execution, I would use .env files:
   API_TOKEN=local_dev_token_123
   DB_PASSWORD=local_password

   And add .env to .gitignore:
   echo ".env" >> .gitignore

   Load in test:
   require('dotenv').config();

   ENTERPRISE SECURITY OPTIONS:
   ----------------------------------------------------------------------------
   For enterprise-level security, I may also integrate with:
   • Azure Key Vault
   • HashiCorp Vault
   • AWS Secrets Manager
   • Google Cloud Secret Manager

   Example with Azure Key Vault:
   ----------------------------------------------------------------------------
   const { SecretClient } = require('@azure/keyvault-secrets');
   const { DefaultAzureCredential } = require('@azure/identity');

   const client = new SecretClient(vaultUrl, new DefaultAzureCredential());
   const secret = await client.getSecret('API_TOKEN');
   process.env.API_TOKEN = secret.value;

   BEST PRACTICES:
   ----------------------------------------------------------------------------
   • Never commit secrets to Git
   • Rotate secrets regularly
   • Use different secrets per environment
   • Audit secret access
   • Mask secrets in CI logs

   This keeps secrets secure, environment-specific, and easy to manage across
   CI/CD pipelines.


