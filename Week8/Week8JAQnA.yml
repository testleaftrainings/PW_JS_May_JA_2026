QUESTION 5: Designing a Scalable Playwright Framework from Scratch
================================================================================

Q: "You're joining a new company as the SDET lead. They have no automation
   framework. You need to design a Playwright framework from scratch that will
   scale to 1000+ tests, support multiple environments (QA, Staging, Prod), and
   be maintainable by 5+ engineers. Draw the architecture and explain each
   layer's responsibility."

A: I would design the framework using layered architecture for scalability and
   maintainability.

   PROJECT STRUCTURE:
   ----------------------------------------------------------------------------
   project-root/
   │
   ├── tests/           → Business test scenarios only
   ├── pages/           → Page Object classes (locators + actions)
   ├── fixtures/        → Reusable setup (login, browser, API context)
   ├── api/             → Backend APIs for test data setup/cleanup
   ├── utils/           → Helpers (date, random data, DB utilities)
   ├── test-data/       → JSON/CSV test data files
   ├── config/          → Environment configs (QA, Staging, Prod)
   ├── reports/         → Traces, screenshots, HTML/Allure reports
   └── playwright.config.ts

   LAYER RESPONSIBILITIES:
   ----------------------------------------------------------------------------
   ┌─────────────────┬─────────────────────────────────────────────────────────┐
   │ Layer           │ Responsibility                                         │
   ├─────────────────┼─────────────────────────────────────────────────────────┤
   │ tests/          │ Contains ONLY test scenarios (what to test)            │
   │                 │ No locators, no setup logic, no assertions about       │
   │                 │ implementation details                                 │
   ├─────────────────┼─────────────────────────────────────────────────────────┤
   │ pages/          │ Page Object Model - locators + page actions            │
   │                 │ Example: LoginPage.login(user, pass)                   │
   ├─────────────────┼─────────────────────────────────────────────────────────┤
   │ fixtures/       │ Reusable test fixtures (authenticatedPage, apiContext) │
   │                 │ Dependency injection for tests                         │
   ├─────────────────┼─────────────────────────────────────────────────────────┤
   │ api/            │ API clients for test data setup/cleanup                │
   │                 │ Create users, orders, products via API                 │
   ├─────────────────┼─────────────────────────────────────────────────────────┤
   │ utils/          │ Common helpers: date formatting, random data,          │
   │                 │ file operations, database utilities                    │
   ├─────────────────┼─────────────────────────────────────────────────────────┤
   │ test-data/      │ JSON/CSV files for data-driven testing                 │
   ├─────────────────┼─────────────────────────────────────────────────────────┤
   │ config/         │ Environment-specific configs (baseURL, credentials)    │
   └─────────────────┴─────────────────────────────────────────────────────────┘

   KEY TECHNICAL CHOICES:
   ----------------------------------------------------------------------------
   • Custom fixtures for reusable authentication
   • Page Object Model for maintainability
   • Environment variables for configuration
   • Cross-browser projects (Chrome, Firefox, Safari)
   • Parallel execution (sharding for 1000+ tests)
   • CI/CD integration (GitHub Actions / Jenkins)

   STABILITY PRACTICES:
   ----------------------------------------------------------------------------
   • Use data-testid attributes
   • Avoid hard waits (waitForTimeout)
   • Centralize all locators in page objects
   • Isolate test data (unique per test)
   • Proper cleanup after tests

   The goal is to make the framework reusable, scalable for 1000+ tests, and
   easy for multiple engineers to maintain.

