QUESTION 2: Framework Stability Despite Frequent Locator Changes
================================================================================

Q: "Your development team releases new builds every day, and frontend developers
   keep changing CSS classes, IDs, and DOM structure. Your Playwright locators
   break every other day. How would you design a framework that remains stable
   despite frequent locator changes? Be specific about locator strategies and
   alternative approaches."

A: First, I would avoid depending on unstable locators like dynamic IDs,
   autogenerated classes, or long XPath chains because those are the first
   things that usually change during frontend releases.

   PRIMARY LOCATOR STRATEGY (In order of preference):
   ----------------------------------------------------------------------------
   1. data-testid attributes
   2. getByRole (accessibility locators)
   3. getByLabel (form labels)
   4. getByPlaceholder (input placeholders)
   5. Visible text (when appropriate)

   Example:
   page.getByRole('button', { name: 'Login' })

   instead of:
   page.locator('.btn-primary-123')

   COLLABORATION WITH DEVELOPERS:
   ----------------------------------------------------------------------------
   I usually work closely with developers and request dedicated attributes like:
   data-testid="login-button"

   because test IDs are stable and independent of UI styling changes.

   CENTRALIZE LOCATORS:
   ----------------------------------------------------------------------------
   Framework-wise, I would centralize all locators inside Page Object classes,
   so if a locator changes, I only update it in one place instead of across
   multiple test files.

   AVOID FRAGILE XPATH:
   ----------------------------------------------------------------------------
   I would also avoid fragile XPath like:
   //div[2]/div[3]/button

   and prefer relative or semantic locators.

   FALLBACK LOCATOR STRATEGIES:
   ----------------------------------------------------------------------------
   For highly dynamic applications, I sometimes use fallback locator strategies:
   page.getByTestId('submit-btn')
     .or(page.getByRole('button', { name: 'Submit' }))

   MONITORING AND REVIEW:
   ----------------------------------------------------------------------------
   I also periodically review flaky locators using Playwright trace viewer and
   failure reports.

   Another important thing is avoiding over-coupling tests with DOM structure.
   Tests should validate user behavior, not internal HTML hierarchy.

   ENFORCE STANDARDS:
   ----------------------------------------------------------------------------
   Finally, I would enforce locator standards during framework development:
   • No absolute XPath allowed
   • Prefer accessibility locators (getByRole, getByLabel)
   • Mandatory test IDs for critical flows
   • Locator reviews during PRs

   This makes the framework much more stable even when frontend changes happen
   frequently.


