QUESTION 8: Git Commands to Push Code to Remote Repository
================================================================================

Q: "Explain the steps to push the code to GIT. Explain the Git commands to push
   the code into remote repository."

A: Here are the step-by-step Git commands to push code to a remote repository:

   STEP 1 - Initialize Local Repository (if new project):
   ----------------------------------------------------------------------------
   git init

   STEP 2 - Check Current Status:
   ----------------------------------------------------------------------------
   git status

   STEP 3 - Add Files to Staging Area:
   ----------------------------------------------------------------------------
   # Add all files
   git add .

   # Or add specific files
   git add src/tests/login.spec.ts
   git add playwright.config.ts

   STEP 4 - Commit Changes with Meaningful Message:
   ----------------------------------------------------------------------------
   git commit -m "Added Playwright login automation tests"

   # Good commit message examples:
   git commit -m "feat: add cross-browser support for login tests"
   git commit -m "fix: resolve flaky selector in dashboard spec"
   git commit -m "refactor: extract common fixtures to base class"

   STEP 5 - Connect Local to Remote Repository (first time only):
   ----------------------------------------------------------------------------
   git remote add origin https://github.com/username/repository.git

   # Verify remote connection
   git remote -v

   STEP 6 - Push Code to Remote Branch:
   ----------------------------------------------------------------------------
   # Push to main branch
   git push origin main

   # Push to specific branch
   git push origin feature/login-tests

   # Set upstream and push (for new branches)
   git push -u origin feature/login-tests

   COMMON ADDITIONAL COMMANDS:
   ----------------------------------------------------------------------------
   # Pull latest code from remote
   git pull origin main

   # Clone an existing repository
   git clone https://github.com/username/repository.git

   # Create a new branch
   git checkout -b feature/new-tests

   # Switch between branches
   git checkout main
   git checkout feature/new-tests

   # View commit history
   git log --oneline

   # See differences
   git diff

   # Undo staging
   git reset HEAD filename

   # Undo last commit (keep changes)
   git reset --soft HEAD~1

   TYPICAL WORKFLOW FOR NEW FEATURE:
   ----------------------------------------------------------------------------
   # 1. Create and switch to feature branch
   git checkout -b feature/login-tests

   # 2. Make changes and commit
   git add .
   git commit -m "feat: add login page object and tests"

   # 3. Push feature branch to remote
   git push -u origin feature/login-tests

   # 4. Create Pull Request on GitHub/GitLab

   # 5. After PR is merged, update local main
   git checkout main
   git pull origin main

   # 6. Delete feature branch (optional)
   git branch -d feature/login-tests

   BEST PRACTICES:
   ----------------------------------------------------------------------------
   • Write clear, descriptive commit messages
   • Commit often with small, logical changes
   • Never commit secrets or environment files
   • Use .gitignore to exclude sensitive files
   • Pull latest changes before pushing
   • Resolve conflicts locally before pushing

   Example .gitignore for Playwright projects:
   ----------------------------------------------------------------------------
   node_modules/
   test-results/
   playwright-report/
   .env
   *.log
   .DS_Store
   dist/
   coverage/


