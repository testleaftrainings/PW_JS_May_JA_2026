QUESTION 3: Removing Hard Waits - Proper Synchronization
================================================================================

Q: "Your test fails intermittently because the application sometimes takes 500ms
   to load a modal and sometimes takes 5 seconds. A junior engineer added
   await page.waitForTimeout(5000) everywhere to fix it. How would you remove
   all hard waits and implement proper synchronization in Playwright? Show code
   examples."

A: I would avoid waitForTimeout() because it makes tests slow and still
   unreliable. Instead of waiting a fixed time, I would wait for the actual
   application state or element condition.

   For modal synchronization:
   ----------------------------------------------------------------------------
   Instead of:
   await page.waitForTimeout(5000);

   I would use:
   await expect(page.locator('#modal')).toBeVisible();

   Or:
   await page.locator('#modal').waitFor({ state: 'visible' });

   For loaders and spinners:
   ----------------------------------------------------------------------------
   await expect(page.locator('.spinner')).toBeHidden();

   For API-dependent UI:
   ----------------------------------------------------------------------------
   await page.waitForResponse(res =>
     res.url().includes('/orders') && res.status() === 200
   );

   For page load state:
   ----------------------------------------------------------------------------
   await page.waitForLoadState('networkidle');
   await page.waitForLoadState('domcontentloaded');

   For element to be enabled/clickable:
   ----------------------------------------------------------------------------
   await expect(page.locator('#submit-btn')).toBeEnabled();
   await expect(page.locator('#submit-btn')).toBeEditable();

   SYSTEMATIC REPLACEMENT STRATEGY:
   ----------------------------------------------------------------------------
   I would systematically remove all hard waits from the framework and replace
   them with:
   • Element state waits (toBeVisible, toBeHidden, toBeEnabled)
   • Response waits (waitForResponse)
   • Load state waits (waitForLoadState)
   • Assertion-based synchronization (expect().toPass())

   Example - Polling for condition:
   ----------------------------------------------------------------------------
   await expect(async () => {
     const status = await page.locator('#status').textContent();
     expect(status).toBe('Completed');
   }).toPass();

   This makes tests faster, more stable, and adaptive to both fast and slow
   environments.

