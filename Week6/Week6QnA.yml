Q3.How can API testing be integrated with browser-based testing in Playwright?

 Example:

  Use API to **create a user/session** → get auth token.
  Use that token in browser context → skip login UI.

  Explanation :

  test('Login using API + continue in UI', async ({ request, page }) => {

    // API Login
    const response = await request.post('/login', {
        data: {
            username: 'admin',
            password: 'test123'
        }
    })

    const responseBody = await response.json()

    const token = responseBody.token

    // Inject token into browser
    await page.addInitScript(token => {

        localStorage.setItem('token', token)

    }, token)

    // Open application
    await page.goto('https://example.com/dashboard')

})


Playwright secretly inserts:

localStorage.setItem('token', token)

into browser storage.

So when website opens,
website checks:

"Do I already have login token?"

Answer:

YES

So app skips login page.

What Happens Internally?

This code:

await page.addInitScript(token => {

    localStorage.setItem('token', token)

}, token)

means:

Step 1

Before page loads,

Playwright injects JavaScript into browser.

Step 2

That JavaScript stores token in:

Browser Local Storage

like:

token = abc123
Step 3

Then application loads.

Application reads token from storage.

Step 4

Application thinks:

User already authenticated

addInitScript()

runs BEFORE application JavaScript executes.

That is why it is preferred for:

authentication
mocking
overriding browser APIs
setting storage values early
-----

Without addInitScript()

Open Website
↓
Website checks token
↓
No token found
↓
Show Login Page

----

With addInitScript()

Inject token first
↓
Open Website
↓
Website checks token
↓
Token found
↓
Open Dashboard directly

