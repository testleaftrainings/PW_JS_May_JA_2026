

A. Storage state.
------------------

Q1. Parallel Tests with storageState

Q:
Test A runs as Admin, Test B as a standard user. Both reuse storageState to skip login. How do you ensure isolation?

A:
Create separate browser contexts for each user state:

const adminContext = await browser.newContext({ storageState: 'adminState.json' });
const userContext = await browser.newContext({ storageState: 'userState.json' });

Avoid sharing the same storage file between parallel tests to prevent race conditions.

