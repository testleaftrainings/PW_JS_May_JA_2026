Q4."When would you choose CSV over JSON for test data? How do you iterate through a JSON array to generate dynamic test cases in Playwright?"

Use for Data-Driven Testing (DDT) where you have hundreds of permutations of the same flat fields (e.g., a search field test with 500 different strings). It’s memory-efficient for the runner.

Use CSV when:
The test data is simple (rows and columns).
You have only a few fields like username, password, and expected result.
Non-technical people (QA, Business Analysts) need to edit the data easily in Excel.

Example:

Username	Password	Expected
admin	admin123	Success
user1	pass123	Failure

CSV is easy to create and maintain.

Use JSON when:
The data is complex or nested.
You have objects, arrays, or multiple levels of information.
Different test cases require different sets of data.

Example:

[
  {
    "username": "admin",
    "password": "admin123",
    "roles": ["Admin", "Manager"]
  },
  {
    "username": "user1",
    "password": "pass123",
    "roles": ["User"]
  }
]

JSON is more flexible than CSV.

Interview Answer

"I use CSV when the data is simple and tabular because it's easy to edit in Excel. I use JSON when the test data is complex, contains nested objects or arrays, or different test cases need different fields."
json:
ex : testcase.json

[
 {
