Q7.“In the CSV file, some rows have extra optional fields (e.g. discount codes) that only apply if non-empty. How would you handle these optional fields in a robust Playwright parameterized test?

When parsing the CSV, use the columns: true and relax_column_count: true options. This prevents the parser from throwing an error if Row 5 has 3 columns but Row 6 only has 2.
typescript
const records = parse(fs.readFileSync('data.csv'), {
columns: true,
skip_empty_lines: true, // extra spaces in the row can be handles using skip_empty_lines: true
 relax_column_count: true // Don't crash if columns are missing
});


